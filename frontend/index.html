<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>EduNexus — Academic materials for Ethiopian students</title>
  <link rel="icon" type="image/png" href="/favicon.png" />
  <!-- Apply theme BEFORE first paint to prevent flash of wrong theme -->
  <script>
    (function () {
      try {
        var stored = localStorage.getItem("edunexus-theme");
        if (stored === "dark") {
          document.documentElement.classList.add("dark");
        } else {
          document.documentElement.classList.remove("dark");
        }
      } catch (e) { }
    })();
  </script>
  <meta name="description"
    content="Upload, share, and access notes, past exams and study materials from 30+ Ethiopian universities. Built for students, by students." />
  <meta name="author" content="EduNexus" />

  <!-- Open Graph / Facebook -->
  <meta property="og:type" content="website" />
  <meta property="og:url" content="https://edunexus-silk.vercel.app/" />
  <meta property="og:image" content="https://edunexus-silk.vercel.app/future.png" />
  <meta property="og:image:secure_url" content="https://edunexus-silk.vercel.app/future.png" />
  <meta property="og:image:type" content="image/png" />
  <meta property="og:image:width" content="1200" />
  <meta property="og:image:height" content="630" />
  <meta property="og:image:alt" content="EduNexus - Academic materials platform for Ethiopian students" />
  <meta property="og:site_name" content="EduNexus" />
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
